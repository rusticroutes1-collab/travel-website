<!DOCTYPE html>
<html>
<head>
<title>Travel Document Generator</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
background:white;
max-width:700px;
margin:auto;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:8px 0 15px 0;
}

button{
padding:10px 18px;
background:#2a7ae2;
color:white;
border:none;
margin-right:10px;
cursor:pointer;
}

.output{
margin-top:25px;
background:#fafafa;
padding:20px;
border:1px solid #ddd;
}
</style>

</head>

<body>

<div class="container">

<h2>Travel Agency Document Generator</h2>

<label>Client Name</label>
<input id="client">

<label>Destination</label>
<input id="destination">

<label>Travel Dates</label>
<input id="dates">

<label>Hotel</label>
<input id="hotel">

<label>Total Price</label>
<input id="price">

<button onclick="generateQuotation()">Quotation</button>
<button onclick="generateVoucher()">Voucher</button>
<button onclick="generateInvoice()">Invoice</button>

<div class="output" id="output"></div>

</div>

<script>

function getData(){
return {
client:document.getElementById("client").value,
destination:document.getElementById("destination").value,
dates:document.getElementById("dates").value,
hotel:document.getElementById("hotel").value,
price:document.getElementById("price").value
}
}

function generateQuotation(){

let d=getData()

document.getElementById("output").innerHTML=
`
<h3>Quotation</h3>
Client: ${d.client}<br>
Destination: ${d.destination}<br>
Travel Dates: ${d.dates}<br>
Hotel: ${d.hotel}<br>
Total Cost: ₹${d.price}
`
}

function generateVoucher(){

let d=getData()

document.getElementById("output").innerHTML=
`
<h3>Booking Voucher</h3>
Passenger: ${d.client}<br>
Destination: ${d.destination}<br>
Travel Dates: ${d.dates}<br>
Hotel: ${d.hotel}
`
}

function generateInvoice(){

let d=getData()

document.getElementById("output").innerHTML=
`
<h3>Invoice</h3>
Bill To: ${d.client}<br>
Package: ${d.destination}<br>
Travel Dates: ${d.dates}<br>
Amount Payable: ₹${d.price}
`
}

</script>

</body>
</html>
