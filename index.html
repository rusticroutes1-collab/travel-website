<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Travel Quotation Tool</title>
<style>
body{font-family:Arial;margin:20px;background:#f5f5f5}
h2{margin-top:0}
textarea,input{width:100%;padding:8px;margin:6px 0}
.section{background:#fff;padding:15px;margin-bottom:15px;border-radius:6px;box-shadow:0 0 4px rgba(0,0,0,0.1)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{padding:10px 14px;margin-top:10px;border:none;background:#0077cc;color:white;border-radius:4px;cursor:pointer}
button:hover{background:#005fa3}

@media print{
#inputSection{display:none}
button{display:none}
textarea,input{border:none}
}

ul{margin:5px 0 0 18px}
</style>
</head>
<body>

<h2>AI Travel Quotation Generator</h2>

<div class="section" id="inputSection">
<label>Paste Rough Quotation / WhatsApp Text</label>
<textarea id="roughQuote" rows="8"></textarea>

<label>OpenAI API Key</label>
<input id="apiKey" placeholder="sk-...">

<button onclick="runAI()">Generate Details</button>
</div>

<div class="section">
<h3>Basic Details</h3>
<div class="grid">
<div>
<label>Destination</label>
<input id="destination">
</div>
<div>
<label>Travel Date</label>
<input id="travelDate">
</div>
<div>
<label>Duration</label>
<input id="duration">
</div>
<div>
<label>Total Price</label>
<input id="price1">
</div>
</div>
</div>

<div class="section">
<h3>Pax Details</h3>
<div class="grid">
<div>
<label>Adults</label>
<input id="adults">
</div>
<div>
<label>Children</label>
<input id="children">
</div>
</div>
</div>

<div class="section">
<h3>Hotel Option 1</h3>
Price
<input id="priceOption1">

City
<input id="opt1city1" list="hotelMemory">
Hotel
<input id="opt1hotel1" list="hotelMemory">

City
<input id="opt1city2" list="hotelMemory">
Hotel
<input id="opt1hotel2" list="hotelMemory">
</div>

<div class="section">
<h3>Hotel Option 2</h3>
Price
<input id="priceOption2">

City
<input id="opt2city1" list="hotelMemory">
Hotel
<input id="opt2hotel1" list="hotelMemory">

City
<input id="opt2city2" list="hotelMemory">
Hotel
<input id="opt2hotel2" list="hotelMemory">
</div>

<datalist id="hotelMemory"></datalist>

<div class="section">
<h3>Inclusions</h3>
<div id="inclusionsList"></div>
</div>

<div class="section">
<h3>Exclusions</h3>
<div id="exclusionsList"></div>
</div>

<div class="section">
<h3>Day Wise Itinerary</h3>
<div id="itineraryList"></div>
</div>

<div class="section">
<button onclick="printQuote()">Print / Save PDF</button>
</div>

<script>

/* LOAD SAVED API KEY */
document.getElementById("apiKey").value = localStorage.getItem("openaiKey") || "";

/* LOAD HOTEL MEMORY */
function loadHotelMemory(){
let hotels = JSON.parse(localStorage.getItem("hotelMemory") || "[]");
let list = document.getElementById("hotelMemory");
list.innerHTML="";

hotels.forEach(h=>{
let opt=document.createElement("option");
opt.value=h;
list.appendChild(opt);
});
}

loadHotelMemory();

/* SAVE HOTEL MEMORY */
function rememberHotel(name){
if(!name) return;

let hotels = JSON.parse(localStorage.getItem("hotelMemory") || "[]");

if(!hotels.includes(name)){
hotels.push(name);
localStorage.setItem("hotelMemory",JSON.stringify(hotels));
}

loadHotelMemory();
}

async function runAI(){

let text=document.getElementById("roughQuote").value;
let apiKey=document.getElementById("apiKey").value;

localStorage.setItem("openaiKey",apiKey);

let prompt=`Extract travel quotation details.

Return JSON only.

{
"destination":"",
"travel_date":"",
"duration":"",
"adults":0,
"children":0,

"options":[
{
"name":"Option 1",
"price":"",
"cities":[{"city":"","hotel":"","nights":0}]
},
{
"name":"Option 2",
"price":"",
"cities":[{"city":"","hotel":"","nights":0}]
}
],

"inclusions":[],
"exclusions":[],
"itinerary":[]
}

If exclusions missing generate common exclusions.
If itinerary missing generate simple day wise itinerary.

Text:\n${text}`;

let response=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"Extract structured travel quotation data"},
{role:"user",content:prompt}
]
})
});

let data=await response.json();

let aiText=data.choices[0].message.content;

aiText = aiText.replace(/```json|```/g,"").trim();

let start = aiText.indexOf("{");
let end = aiText.lastIndexOf("}");

if(start !== -1 && end !== -1){
aiText = aiText.substring(start,end+1);
}

let result={};

try{
result=JSON.parse(aiText);
}catch(e){
console.error("JSON parse error",e);
alert("AI response format error");
return;
}

fillForm(result);

}

function createList(container,data){
if(!data) return;
let arr = Array.isArray(data) ? data : data.split("\n");
let html="<ul>";
arr.forEach(item=>{
if(item && item.trim()) html+="<li>"+item+"</li>";
});
html+="</ul>";
container.innerHTML=html;
}

function fillForm(result){

if(result.destination)
document.getElementById("destination").value=result.destination;

if(result.travel_date)
document.getElementById("travelDate").value=result.travel_date;

if(result.duration)
document.getElementById("duration").value=result.duration;

if(result.adults)
document.getElementById("adults").value=result.adults;

if(result.children)
document.getElementById("children").value=result.children;

if(result.options && result.options.length){

let opt1=result.options[0];
let opt2=result.options[1];

if(opt1){
document.getElementById("priceOption1").value=opt1.price||"";

if(opt1.cities && opt1.cities.length){

document.getElementById("opt1city1").value=opt1.cities[0]?.city||"";
document.getElementById("opt1hotel1").value=opt1.cities[0]?.hotel||"";
rememberHotel(opt1.cities[0]?.hotel);

if(opt1.cities[1]){
document.getElementById("opt1city2").value=opt1.cities[1].city||"";
document.getElementById("opt1hotel2").value=opt1.cities[1].hotel||"";
rememberHotel(opt1.cities[1].hotel);
}
}
}

if(opt2){
document.getElementById("priceOption2").value=opt2.price||"";

if(opt2.cities && opt2.cities.length){

document.getElementById("opt2city1").value=opt2.cities[0]?.city||"";
document.getElementById("opt2hotel1").value=opt2.cities[0]?.hotel||"";
rememberHotel(opt2.cities[0]?.hotel);

if(opt2.cities[1]){
document.getElementById("opt2city2").value=opt2.cities[1].city||"";
document.getElementById("opt2hotel2").value=opt2.cities[1].hotel||"";
rememberHotel(opt2.cities[1].hotel);
}
}
}

}

createList(document.getElementById("inclusionsList"),result.inclusions);
createList(document.getElementById("exclusionsList"),result.exclusions);
createList(document.getElementById("itineraryList"),result.itinerary);

}

function printQuote(){
window.print();
}

</script>

</body>
</html>
