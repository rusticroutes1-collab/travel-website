<!DOCTYPE html>
<html>

<head>
<title>Rustic Routes Holidays - Package Quotation</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.header{
display:grid;
grid-template-columns:200px auto;
align-items:start;
width:100%;
margin-bottom:25px;
}

.header img{
height:60px;
}

.header div{
text-align:right;
line-height:1.4;
}

.container{
background:white;
max-width:800px;
margin:auto;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);

<body>

<div class="container">
<div id="formArea">
<div class="header">

<img src="logo.png">

<div>
<h2 style="margin:0;">Rustic Routes Holidays</h2>

<p style="margin:3px 0;">
Phone : +91 9811335942<br>
Email : bookings@rusticroutes.net<br>
Web : www.rusticroutes.net
</p>

</div>

</div>

<h3 style="text-align:center;">PACKAGE QUOTATION</h3>

<label>Destination</label>
<input id="destination">

<label>Pax Details</label>
<input type="number" id="pax" placeholder="Enter number of passengers">

<label>Duration</label>
<input id="duration">

<label>Travel Date</label>
<input id="date">

<label>Arrival</label>
<input id="arrival">

<label>Departure</label>
<input id="departure">

<h3>Option 1</h3>
<h3>Paste Rough Quote</h3>

<textarea id="roughQuote" placeholder="Paste rough quotation here" style="width:100%;height:120px;"></textarea>

<button type="button" onclick="smartParse()">Auto Fill Fields</button>
<hr>
<label>Hotel Details</label>
<input type="text" id="hotel1">

<label>Package Cost</label>
<input type="text" id="price1">

<button type="button" onclick="addHotelOption()">+ Add Hotel Option</button>

<div id="hotelOptions"></div>



<h3>Brief Itinerary</h3>
<textarea id="itinerary"></textarea>

<h3>Inclusions</h3>
<textarea id="inclusions"></textarea>

<h3>Exclusions</h3>
<textarea id="exclusions"></textarea>

<button onclick="generateQuotation()">Generate Quotation</button>

</div>

<div class="output" id="output" style="display:none;"></div>

<button onclick="downloadPDF()">Download PDF</button>
</div>


<script>

let hotelCount = 1;

function smartParse(){

let hotelIndex = 1;

let text = document.getElementById("roughQuote").value;
let lines = text.split("\n");

let section="";
let inclusionsText="";
let exclusionsText="";
let cities=[];

for(let i=0;i<lines.length;i++){

let clean = lines[i].trim();
let lower = clean.toLowerCase();

if(clean==="") continue;

/* DESTINATION */
if(lower.includes("destination")){

let val = clean.split(":")[1];

if(val){

document.getElementById("destination").value = val.trim();

let parts = val.split("+");
let totalNights = 0;

for(let j=0;j<parts.length;j++){

let nightMatch = parts[j].match(/\d+/);

if(nightMatch){
totalNights += parseInt(nightMatch[0]);
}

let city = parts[j].replace(/[0-9nN]/g,"").trim();

if(city){
cities.push(city);
}

}

if(totalNights>0){

let days = totalNights + 1;

document.getElementById("duration").value =
totalNights + " Nights / " + days + " Days";

}

}

continue;

}

/* TRAVEL DATE */

let dateMatch = clean.match(/\d{1,2}\s+[A-Za-z]+\s+\d{4}/);

if(dateMatch){
document.getElementById("date").value = dateMatch[0];
}

/* PAX */

if(lower.includes("pax")){

let val = clean.split(":")[1];

if(val){
document.getElementById("pax").value = val.trim();
}

continue;

}

/* HOTEL SECTION */

if(lower==="hotels"){
section="hotels";
continue;
}

/* HOTEL LINES */

if(section==="hotels"){

if(lower.includes("package") || lower==="inclusions" || lower==="exclusions"){
section="";
}else{

let h = document.getElementById("hotel"+hotelIndex);

if(h){

h.value = clean;

hotelIndex++;

let nextHotel = document.getElementById("hotel"+hotelIndex);

if(!nextHotel){
addHotel();
}

}

}

continue;

}

/* PACKAGE COST */

if(lower.includes("package cost")){

let price = clean.match(/\d+/);

if(price){
document.getElementById("price1").value = "₹"+price[0];
}

continue;

}

/* INCLUSIONS */

if(lower==="inclusions"){
section="inclusions";
continue;
}

/* EXCLUSIONS */

if(lower==="exclusions"){
section="exclusions";
continue;
}

/* INCLUSIONS TEXT */

if(section==="inclusions"){
inclusionsText += clean+"\n";
}

/* EXCLUSIONS TEXT */

if(section==="exclusions"){
exclusionsText += clean+"\n";
}

}

/* ARRIVAL / DEPARTURE */

if(cities.length>0){

document.getElementById("arrival").value = cities[0];
document.getElementById("departure").value = cities[cities.length-1];

}

/* TEXTAREAS */

document.getElementById("inclusions").value = inclusionsText;
document.getElementById("exclusions").value = exclusionsText;

}
function addHotelOption(){

hotelCount++;

let html = `
<div id="option${hotelCount}">
<hr>

<h3>Option ${hotelCount}</h3>

<label>Hotel Details</label>
<input type="text" id="hotel${hotelCount}">

<label>Package Cost</label>
<input type="text" id="price${hotelCount}">

</div>
`;

document.getElementById("hotelOptions").innerHTML += html;

}
function generateQuotation(){

let destination=document.getElementById("destination").value
let pax = document.getElementById("pax").value;

let paxText = pax + " Adult";
if(pax > 1){
    paxText = pax + " Adults";
}
let duration=document.getElementById("duration").value
let date=document.getElementById("date").value
let arrival=document.getElementById("arrival").value
let departure=document.getElementById("departure").value

let hotel1 = document.getElementById("hotel1").value;
let price1 = document.getElementById("price1").value;

let hotelHTML = hotel1;

for(let i=2;i<=hotelCount;i++){

let h=document.getElementById("hotel"+i);

if(h && h.value){
hotelHTML += "<br>"+h.value
}

}

let itinerary=document.getElementById("itinerary").value
let inclusions=document.getElementById("inclusions").value
let exclusions=document.getElementById("exclusions").value

document.getElementById("formArea").style.display="none";
document.getElementById("output").style.display="block";

document.getElementById("output").innerHTML = `

<h2 style="text-align:center">PACKAGE QUOTATION</h2>

<b>Destination :</b> ${destination}<br>
<b>Pax :</b> ${paxText}<br>
<b>Duration :</b> ${duration}<br>
<b>Travel Date :</b> ${date}<br>
<b>Arrival :</b> ${arrival}<br>
<b>Departure :</b> ${departure}<br>

<hr>

<h3>Hotel</h3>

<b>Package Cost :</b> ${price1}<br><br>

${hotelHTML}

<hr>

<h3>Brief Itinerary</h3>

${itinerary}

<hr>

<h3>Inclusions</h3>

${inclusions.split("\n").map(i => "<li>"+i+"</li>").join("")}
<hr>

<h3>Exclusions</h3>

${exclusions}

`;

}
function downloadPDF(){
window.print();
}

</script>
</body>

</html>
