<!DOCTYPE html>
<html>

<head>

<title>Rustic Routes Holidays - Package Quotation</title>

<link rel="icon" href="logo.png">

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
background:white;
max-width:900px;
margin:auto;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:12px 18px;
background:#2a7ae2;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

.output{
margin-top:30px;
padding:25px;
border:1px solid #ccc;
background:#fafafa;
}

hr{
margin:25px 0;
}

</style>

</head>

<body>

<div class="container">

<div id="formArea">

<h2 style="text-align:center">PACKAGE QUOTATION</h2>

<label>Destination</label>
<input id="destination">

<label>Pax</label>
<input id="pax">

<label>Duration</label>
<input id="duration">

<label>Travel Date</label>
<input id="date">

<label>Arrival</label>
<input id="arrival">

<label>Departure</label>
<input id="departure">

<h3>Paste Rough Quote</h3>

<textarea id="roughQuote" style="height:120px;"></textarea>

<button onclick="smartParse()">Auto Fill Fields</button>
<button onclick="smartParse()">AI Extract Quote</button>

<hr>

<label>Hotel Details</label>
<input id="hotel1">

<label>Package Cost</label>
<input id="price1">

<h3>Brief Itinerary</h3>
<textarea id="itinerary"></textarea>

<h3>Inclusions</h3>
<textarea id="inclusions"></textarea>

<h3>Exclusions</h3>
<textarea id="exclusions"></textarea>

<button onclick="generateQuotation()">Generate Quotation</button>

</div>

<div class="output" id="output" style="display:none;"></div>

<button onclick="downloadPDF()">Download PDF</button>

</div>

<script>
console.log("SCRIPT LOADED");
function smartParse(){

let text=document.getElementById("roughQuote").value;
let lines=text.split("\n");

let section="";
let inclusionsText="";
let exclusionsText="";

for(let i=0;i<lines.length;i++){

let clean=lines[i].trim();
let lower=clean.toLowerCase();

if(clean==="") continue;

if(lower.includes("destination")){
let val=clean.split(":")[1];
if(val) document.getElementById("destination").value=val.trim();
}

if(lower.includes("package cost")){
let price=clean.match(/[0-9,]+/);
if(price) document.getElementById("price1").value="₹"+price[0];
}

if(lower.includes("inclusion")){
section="inclusions";
continue;
}

if(lower.includes("exclusion")){
section="exclusions";
continue;
}

if(section==="inclusions"){
inclusionsText+=clean+"\n";
continue;
}

if(section==="exclusions"){
exclusionsText+=clean+"\n";
continue;
}

}

document.getElementById("inclusions").value=inclusionsText;
document.getElementById("exclusions").value=exclusionsText;

}

async function extractWithAI(){

let text=document.getElementById("roughQuote").value;

let response = await fetch("https://api.openai.com/v1/chat/completions", {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": "Bearer YOUR_API_KEY"
},
body: JSON.stringify({
model: "gpt-4o-mini",
messages: [
{
role: "system",
content: "Extract travel quotation details and return JSON with fields destination, hotels, package_cost, inclusions, exclusions, itinerary"
},
{
role: "user",
content: text
}
]
})
});

let data = await response.json();

let aiText = data.choices[0].message.content;

aiText = aiText.replace(/```json/g,'').replace(/```/g,'');

let aiData = JSON.parse(aiText);


/* Destination */

if(aiData.destination){
let el = document.getElementById("destination");
if(el) el.value = aiData.destination;
}


/* Package Cost */

if(aiData.package_cost){
let el = document.getElementById("packageCost");
if(el) el.value = aiData.package_cost;
}


/* Inclusions */

if(aiData.inclusions && aiData.inclusions.length){
let el = document.getElementById("inclusions");
if(el) el.value = aiData.inclusions.join("\n");
}


/* Exclusions */

if(aiData.exclusions && aiData.exclusions.length){
let el = document.getElementById("exclusions");
if(el) el.value = aiData.exclusions.join("\n");
}


/* Hotels */

if(aiData.hotels && aiData.hotels.length){

for(let i=0;i<aiData.hotels.length;i++){

let hotel = aiData.hotels[i];

let cityField = document.getElementById("hotelCity"+(i+1));
let nameField = document.getElementById("hotelName"+(i+1));
let nightsField = document.getElementById("hotelNights"+(i+1));

if(cityField && hotel.city) cityField.value = hotel.city;
if(nameField && hotel.name) nameField.value = hotel.name;
if(nightsField && hotel.nights) nightsField.value = hotel.nights;

}

}


/* Itinerary */

if(aiData.itinerary && aiData.itinerary.length){

let text = "";

aiData.itinerary.forEach(day=>{
text += day + "\n";
});

let el = document.getElementById("itinerary");
if(el) el.value = text;

}
function generateQuotation(){

let destination=document.getElementById("destination").value;
let pax=document.getElementById("pax").value;
let duration=document.getElementById("duration").value;
let date=document.getElementById("date").value;
let arrival=document.getElementById("arrival").value;
let departure=document.getElementById("departure").value;

let hotel=document.getElementById("hotel1").value;
let price=document.getElementById("price1").value;

let itinerary=document.getElementById("itinerary").value;
let inclusions=document.getElementById("inclusions").value;
let exclusions=document.getElementById("exclusions").value;

document.getElementById("formArea").style.display="none";
document.getElementById("output").style.display="block";

document.getElementById("output").innerHTML=`

<h2 style="text-align:center">PACKAGE QUOTATION</h2>

<b>Destination :</b> ${destination}<br>
let html = `<b>Pax :</b> ${pax}<br>
<b>Duration :</b> ${duration}<br>
<b>Travel Date :</b> ${date}<br>
<b>Arrival :</b> ${arrival}<br>
<b>Departure :</b> ${departure}<br>

<hr>

<h3>Hotel</h3>

<b>Package Cost :</b> ${price}<br><br>

${hotel}

<h3>Exclusions</h3>

${exclusions}
`;

document.getElementById("quotation").innerHTML = html;



}

function downloadPDF(){
window.print();
}

</script>

</body>
</html>
