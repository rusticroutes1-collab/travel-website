<!DOCTYPE html>
<html>

<head>
<title>Rustic Routes Holidays - Package Quotation</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
background:white;
max-width:900px;
margin:auto;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
display:grid;
grid-template-columns:200px auto;
align-items:start;
margin-bottom:25px;
}

.header img{
height:60px;
}

.header div{
text-align:right;
line-height:1.4;
}

input, textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:12px 18px;
background:#2a7ae2;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

.output{
margin-top:30px;
padding:25px;
border:1px solid #ccc;
background:#fafafa;
}

hr{
margin:25px 0;
}

@media print{

button{display:none;}
textarea,input{display:none;}
#formArea{display:none;}

.container{
box-shadow:none;
border:none;
width:760px;
margin:auto;
}

.output{
border:none;
background:white;
margin:0;
padding:0;
}

}

</style>

</head>

<body>

<div class="container">

<div id="formArea">

<div class="header">

<img src="logo.png">

<div>
<h2 style="margin:0;">Rustic Routes Holidays</h2>

<p style="margin:3px 0;">
Phone : +91 9811335942<br>
Email : bookings@rusticroutes.net<br>
Web : www.rusticroutes.net
</p>

</div>

</div>

<h3 style="text-align:center;">PACKAGE QUOTATION</h3>

<label>Destination</label>
<input id="destination">

<label>Adults</label>
<input type="number" id="adults">

<label>Children</label>
<input type="number" id="children">

<label>Total Pax</label>
<input id="pax">

<label>Duration</label>
<input id="duration">

<label>Travel Date</label>
<input id="date">

<label>Arrival</label>
<input id="arrival">

<label>Departure</label>
<input id="departure">

<label>Validity</label>
<input id="validity">

<h3>Paste Rough Quote</h3>

<textarea id="roughQuote" style="height:120px;"></textarea>

<button onclick="smartParse()">Auto Fill Fields</button>
<button onclick="extractWithAI()">AI Extract Quote</button>

<hr>

<label>Hotel Details</label>
<input id="hotel1">

<label>Package Cost</label>
<input id="price1">

<button onclick="addHotelOption()">+ Add Hotel Option</button>

<div id="hotelOptions"></div>

<h3>Transport</h3>
<textarea id="transport"></textarea>

<h3>Sightseeing</h3>
<textarea id="tours"></textarea>

<h3>Brief Itinerary</h3>
<textarea id="itinerary"></textarea>

<h3>Inclusions</h3>
<textarea id="inclusions"></textarea>

<h3>Exclusions</h3>
<textarea id="exclusions"></textarea>

<h3>Terms & Conditions</h3>
<textarea id="terms"></textarea>

<button onclick="generateQuotation()">Generate Quotation</button>

</div>

<div class="output" id="output" style="display:none;"></div>

<button onclick="downloadPDF()">Download PDF</button>

</div>

<script>

let hotelCount = 1;

/* AUTO CALCULATE PAX */

document.getElementById("adults").addEventListener("input",calcPax);
document.getElementById("children").addEventListener("input",calcPax);

function calcPax(){
let adults = parseInt(document.getElementById("adults").value)||0;
let children = parseInt(document.getElementById("children").value)||0;
document.getElementById("pax").value = adults + children;
}

/* SIMPLE PARSER */

function smartParse(){

let text = document.getElementById("roughQuote").value;
let lines = text.split("\n");

let section="";
let inclusionsText="";
let exclusionsText="";

for(let i=0;i<lines.length;i++){

let clean = lines[i].trim();
let lower = clean.toLowerCase();

if(clean==="") continue;

if(lower.includes("destination")){
let val = clean.split(":")[1];
if(val) document.getElementById("destination").value = val.trim();
}

if(lower.includes("package cost")){
let price = clean.match(/[0-9,]+/);
if(price) document.getElementById("price1").value = "₹"+price[0];
}

if(lower.includes("inclusion")){
section="inclusions";
continue;
}

if(lower.includes("exclusion")){
section="exclusions";
continue;
}

if(section==="inclusions"){
inclusionsText += clean+"\n";
continue;
}

if(section==="exclusions"){
exclusionsText += clean+"\n";
continue;
}

}

document.getElementById("inclusions").value = inclusionsText;
document.getElementById("exclusions").value = exclusionsText;

}

/* ADD HOTEL OPTION */

function addHotelOption(){

hotelCount++;

let html = `
<hr>
<h3>Option ${hotelCount}</h3>

<label>Hotel Details</label>
<input id="hotel${hotelCount}">

<label>Package Cost</label>
<input id="price${hotelCount}">
`;

document.getElementById("hotelOptions").innerHTML += html;

}

/* AI EXTRACTION */

async function extractWithAI(){

let text = document.getElementById("roughQuote").value;

let response = await fetch("https://weathered-mountain-83f0.rusticroutes1.workers.dev",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
model:"gpt-4.1-mini",
messages:[
{role:"system",content:"Extract travel quotation data as JSON"},
{role:"user",content:text}
]
})
});

let data = await response.json();
let aiText = data.choices[0].message.content;

aiText = aiText.replace(/```json/g,'').replace(/```/g,'');
let aiData = JSON.parse(aiText);

/* APPLY AI DATA */

if(aiData.destination) document.getElementById("destination").value = aiData.destination;
if(aiData.packageCost) document.getElementById("price1").value = aiData.packageCost;

if(aiData.hotels){

document.getElementById("hotel1").value =
aiData.hotels.map(h=>{
if(typeof h==="object"){
return (h.name||"")+(h.room_type?" - "+h.room_type:"");
}
return h;
}).join("\n");

}

if(aiData.inclusions){
document.getElementById("inclusions").value = aiData.inclusions.join("\n");
}

if(aiData.itinerary){
document.getElementById("itinerary").value = aiData.itinerary.join("\n");
}

}

/* GENERATE QUOTATION */

function generateQuotation(){

let destination=document.getElementById("destination").value;
let pax=document.getElementById("pax").value;
let duration=document.getElementById("duration").value;
let date=document.getElementById("date").value;
let arrival=document.getElementById("arrival").value;
let departure=document.getElementById("departure").value;

let hotel=document.getElementById("hotel1").value;
let price=document.getElementById("price1").value;

let itinerary=document.getElementById("itinerary").value;
let inclusions=document.getElementById("inclusions").value;
let exclusions=document.getElementById("exclusions").value;

document.getElementById("formArea").style.display="none";
document.getElementById("output").style.display="block";

document.getElementById("output").innerHTML=`

<h2 style="text-align:center">PACKAGE QUOTATION</h2>

<b>Destination :</b> ${destination}<br>
<b>Pax :</b> ${pax}<br>
<b>Duration :</b> ${duration}<br>
<b>Travel Date :</b> ${date}<br>
<b>Arrival :</b> ${arrival}<br>
<b>Departure :</b> ${departure}<br>

<hr>

<h3>Hotel</h3>

<b>Package Cost :</b> ${price}<br><br>

${hotel}

<hr>

<h3>Brief Itinerary</h3>

${itinerary}

<hr>

<h3>Inclusions</h3>

${inclusions.split("\n").map(i=>"<li>"+i+"</li>").join("")}

<hr>

<h3>Exclusions</h3>

${exclusions}

`;

}

function downloadPDF(){
window.print();
}

</script>

</body>
</html>
