<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Travel Quotation</title>

<style>
body{
font-family:Arial;
margin:20px;
background:#eef2f7;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#1f3c88;
color:white;
padding:15px;
border-radius:8px;
}

.header h1{
margin:0;
text-align:center;
flex:1;
}

.logo{
max-height:60px;
}

.section{
background:white;
padding:15px;
margin-top:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input,textarea{
width:100%;
padding:6px;
margin-top:5px;
}

button{
background:#1f6feb;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

ul{
margin-left:20px;
}

.itDay{
font-weight:bold;
color:#1f3c88;
}

@media print{
#inputSection{display:none;}
button{display:none;}
body{background:white;}
}
</style>

</head>

<body>

<div class="header">
<div></div>
<h1>Travel Quotation</h1>
<img src="logo.png" class="logo">
</div>

<div class="section" id="inputSection">

<label>Paste Rough Quotation</label>
<textarea id="roughQuote" rows="6"></textarea>

<label>OpenAI API Key</label>
<input id="apiKey">

<button onclick="runAI()">Generate Proposal</button>

</div>

<div class="section">

<h3>Client Details</h3>

<div class="grid">

<div>
Client Name
<input id="clientName">
</div>

<div>
Contact
<input id="clientContact">
</div>

<div>
Proposal No
<input id="quoteNo" readonly>
</div>

<div>
Create Date
<input id="createDate" type="date">
</div>

</div>

</div>

<div class="section">

<h3>Trip Details</h3>

<div class="grid">

<div>
Destination
<input id="destination">
</div>

<div>
Arrival City
<input id="arrivalCity">
</div>

<div>
Departure City
<input id="departureCity">
</div>

<div>
Travel Date
<input id="travelDate">
</div>

<div>
Duration
<input id="duration">
</div>

<div>
Adults
<input id="adults">
</div>

<div>
Children
<input id="children">
</div>

</div>

</div>

<div class="section">

<h3>Hotel Options</h3>

<div id="optionsArea"></div>

<button onclick="addOption()">Add Hotel Option</button>

</div>

<div class="section">

<h3>Inclusions</h3>
<div id="inclusionsList"></div>

</div>

<div class="section">

<h3>Exclusions</h3>
<div id="exclusionsList"></div>

</div>

<div class="section">

<h3>Day Wise Itinerary</h3>
<div id="itineraryList"></div>

<p style="font-size:12px;color:#666">
* Itinerary subject to operational feasibility and local conditions.
</p>

</div>

<div class="section">
<button onclick="window.print()">Print / Save PDF</button>
</div>

<script>

let optionCount=0;

function addOption(){

optionCount++;

let div=document.createElement("div");

div.innerHTML=`
<h4>Option ${optionCount}</h4>

Price
<input id="priceOption${optionCount}">

City
<input id="city${optionCount}_1">

Hotel
<input id="hotel${optionCount}_1">

`;

document.getElementById("optionsArea").appendChild(div);

}

addOption();

function createList(container,data){

if(!data) return;

let arr = Array.isArray(data) ? data : data.split("\n");

let html="<ul>";

arr.forEach(item=>{
if(item && item.trim()) html+="<li>"+item+"</li>";
});

html+="</ul>";

container.innerHTML=html;

}

function buildItinerary(container,data){

if(!data) return;

let html="";

let arr = Array.isArray(data) ? data : data.split("\n");

arr.forEach((item,i)=>{

let text=item;

if(typeof item === 'object'){
text = item.description || item.activity || item.text || JSON.stringify(item);
}

html += `<p><span class='itDay'>Day ${i+1}</span> – ${text}</p>`;

});

container.innerHTML=html;

}

async function runAI(){

let text=document.getElementById("roughQuote").value;
let apiKey=document.getElementById("apiKey").value;

let prompt = `
Extract travel quotation details.

Return JSON only.

{
"destination":"",
"arrival_city":"",
"departure_city":"",
"travel_date":"",
"duration":"",
"adults":0,
"children":0,
"inclusions":[],
"exclusions":[],
"itinerary":[]
}

Text:
${text}
`;

let response = await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},

body:JSON.stringify({

model:"gpt-4o-mini",

messages:[
{role:"system",content:"Extract travel quotation data"},
{role:"user",content:prompt}
]

})

});

let data = await response.json();

let aiText = data.choices[0].message.content;

aiText = aiText.replace(/```json|```/g,"").trim();

let result={};

try{
result=JSON.parse(aiText);
}catch(e){
alert("AI response format error");
return;
}

fillForm(result);

}

function fillForm(result){

if(result.destination)
document.getElementById("destination").value=result.destination;

if(result.arrival_city)
document.getElementById("arrivalCity").value=result.arrival_city;

if(result.departure_city)
document.getElementById("departureCity").value=result.departure_city;

if(result.travel_date)
document.getElementById("travelDate").value=result.travel_date;

if(result.duration)
document.getElementById("duration").value=result.duration;

if(result.adults)
document.getElementById("adults").value=result.adults;

if(result.children)
document.getElementById("children").value=result.children;

createList(document.getElementById("inclusionsList"),result.inclusions);

createList(document.getElementById("exclusionsList"),result.exclusions);

buildItinerary(document.getElementById("itineraryList"),result.itinerary);

}

function setToday(){
let today = new Date().toISOString().split('T')[0];
document.getElementById("createDate").value = today;
}

function generateQuoteNumber(){

let last = localStorage.getItem("lastQuoteNumber") || 0;

last = parseInt(last) + 1;

localStorage.setItem("lastQuoteNumber", last);

let year = new Date().getFullYear();

document.getElementById("quoteNo").value =
"TP-"+year+"-"+String(last).padStart(3,"0");

}

window.onload=function(){

setToday();
generateQuoteNumber();

};

</script>

</body>
</html>
