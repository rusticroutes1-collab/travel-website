<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Travel Quotation Tool</title>
<style>
body{font-family:Arial;margin:20px;background:#f5f5f5}
h2{margin-top:0}
textarea,input{width:100%;padding:8px;margin:6px 0}
.section{background:#fff;padding:15px;margin-bottom:15px;border-radius:6px;box-shadow:0 0 4px rgba(0,0,0,0.1)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{padding:10px 14px;margin-top:10px;border:none;background:#0077cc;color:white;border-radius:4px;cursor:pointer}
button:hover{background:#005fa3}
</style>
</head>
<body>

<h2>AI Travel Quotation Generator</h2>

<div class="section">
<label>Paste Rough Quotation / WhatsApp Text</label>
<textarea id="roughQuote" rows="8" placeholder="Paste travel text here..."></textarea>

<label>OpenAI API Key</label>
<input id="apiKey" placeholder="sk-...">

<button onclick="runAI()">Generate Details</button>
</div>

<div class="section">
<h3>Basic Details</h3>
<div class="grid">
<div>
<label>Destination</label>
<input id="destination">
</div>
<div>
<label>Travel Date</label>
<input id="travelDate">
</div>
<div>
<label>Duration</label>
<input id="duration">
</div>
<div>
<label>Total Price</label>
<input id="price1">
</div>
</div>
</div>

<div class="section">
<h3>Pax Details</h3>
<div class="grid">
<div>
<label>Adults</label>
<input id="adults">
</div>
<div>
<label>Children</label>
<input id="children">
</div>
</div>
</div>

<div class="section">
<h3>City & Hotel Details</h3>
<div class="grid">
<div>
<label>City 1</label>
<input id="city1">
<label>Hotel 1</label>
<input id="hotel1">
<label>Nights</label>
<input id="hotelNights1">
</div>
<div>
<label>City 2</label>
<input id="city2">
<label>Hotel 2</label>
<input id="hotel2">
<label>Nights</label>
<input id="hotelNights2">
</div>
<div>
<label>City 3</label>
<input id="city3">
<label>Hotel 3</label>
<input id="hotel3">
<label>Nights</label>
<input id="hotelNights3">
</div>
</div>
</div>

<div class="section">
<h3>Inclusions</h3>
<textarea id="inclusions" rows="4"></textarea>

<h3>Exclusions</h3>
<textarea id="exclusions" rows="4"></textarea>
</div>

<div class="section">
<h3>Itinerary</h3>
<textarea id="itinerary" rows="8"></textarea>
</div>

<div class="section">
<button onclick="printQuote()">Print / Save PDF</button>
</div>

<script>

async function runAI(){

let text=document.getElementById("roughQuote").value;
let apiKey=document.getElementById("apiKey").value;

let prompt=`Extract travel quotation details.

Return JSON only.

{
"destination":"",
"travel_date":"",
"duration":"",
"adults":0,
"children":0,
"cities":[
{"city":"","hotel":"","nights":0}
],
"price":"",
"inclusions":"",
"exclusions":"",
"itinerary":""
}

Text:\n${text}`;

let response=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"Extract travel quotation details"},
{role:"user",content:prompt}
]
})
});

let data=await response.json();

console.log(data);

let aiText=data.choices[0].message.content;

let result={};

try{
result=JSON.parse(aiText);
}catch(e){
console.error("JSON parse error",e);
alert("AI response format error");
return;
}

console.log(result);

fillForm(result);

}

function fillForm(result){

if(result.destination)
document.getElementById("destination").value=result.destination;

if(result.travel_date)
document.getElementById("travelDate").value=result.travel_date;

if(result.duration)
document.getElementById("duration").value=result.duration;

if(result.price)
document.getElementById("price1").value=result.price;

if(result.adults)
document.getElementById("adults").value=result.adults;

if(result.children)
document.getElementById("children").value=result.children;

if(result.cities && result.cities.length){

for(let i=0;i<result.cities.length;i++){

let cityField=document.getElementById("city"+(i+1));
let hotelField=document.getElementById("hotel"+(i+1));
let nightsField=document.getElementById("hotelNights"+(i+1));

if(cityField) cityField.value=result.cities[i].city || "";
if(hotelField) hotelField.value=result.cities[i].hotel || "";
if(nightsField) nightsField.value=result.cities[i].nights || "";

}
}

if(result.inclusions)
document.getElementById("inclusions").value=result.inclusions;

if(result.exclusions)
document.getElementById("exclusions").value=result.exclusions;

if(result.itinerary)
document.getElementById("itinerary").value=
Array.isArray(result.itinerary)?result.itinerary.join("\n"):result.itinerary;

}

function printQuote(){
window.print();
}

</script>

</body>
</html>
