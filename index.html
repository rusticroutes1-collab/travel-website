<!DOCTYPE html>
<html>

<head>
<title>Rustic Routes Holidays - Package Quotation</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
background:white;
max-width:800px;
margin:auto;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:12px 18px;
background:#2a7ae2;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

.output{
margin-top:30px;
padding:25px;
border:1px solid #ccc;
background:#fafafa;
}



h3{
margin-top:25px;
}

hr{
margin:25px 0;
}

/* PRINT SETTINGS */

@media print{
@page{
size:A4;
margin:20mm;
}
body{
background:white;
padding:0;
}

.container{
box-shadow:none;
border:none;
width:100%;
max-width:100%;
}

button{
display:none;
}

textarea,input{
display:none;
}

#formArea{
display:none;
}

.output{
border:none;
background:white;
margin:0;
padding:0;
}
.header{
width:100%;
box-sizing:border-box;
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:20px;
}

.header img{
max-width:200px;
height:auto;
}

.header div{
max-width:300px;
text-align:right;
word-wrap:break-word;
}
</style>


</head>

<body>

<div class="container">
<div id="formArea">
<div class="header">

<img src="logo.png" style="height:70px;">

<div style="text-align:right;">

<h2 style="margin:0;">Rustic Routes Holidays</h2>

<p style="margin:3px 0;">
Phone : +91 9811335942<br>
Email : bookings@rusticroutes.net<br>
Web : www.rusticroutes.net
</p>

</div>

</div>

<h3 style="text-align:center;">PACKAGE QUOTATION</h3>

<label>Destination</label>
<input id="destination">

<label>Pax Details</label>
<input id="pax">

<label>Duration</label>
<input id="duration">

<label>Travel Date</label>
<input id="date">

<label>Arrival</label>
<input id="arrival">

<label>Departure</label>
<input id="departure">

<h3>Option 1</h3>

<label>Hotel Details</label>
<textarea id="hotel1"></textarea>

<label>Package Cost</label>
<input id="price1">

<h3>Option 2</h3>

<label>Hotel Details</label>
<textarea id="hotel2"></textarea>

<label>Package Cost</label>
<input id="price2">

<h3>Brief Itinerary</h3>
<textarea id="itinerary"></textarea>

<h3>Inclusions</h3>
<textarea id="inclusions"></textarea>

<h3>Exclusions</h3>
<textarea id="exclusions"></textarea>

<button onclick="generateQuotation()">Generate Quotation</button>

</div>

<div class="output" id="output" style="display:none;"></div>

<button onclick="downloadPDF()">Download PDF</button>
</div>

<script>

function listFormat(text){
let items=text.split("\n")
let html="<ul>"

items.forEach(function(item){
if(item.trim()!=""){
html+="<li>"+item+"</li>"
}
})

html+="</ul>"
return html
}

function lineBreak(text){
return text.replace(/\n/g,"<br>")
}

function generateQuotation(){

let destination=document.getElementById("destination").value
let pax=document.getElementById("pax").value
let duration=document.getElementById("duration").value
let date=document.getElementById("date").value
let arrival=document.getElementById("arrival").value
let departure=document.getElementById("departure").value

let hotel1=lineBreak(document.getElementById("hotel1").value)
let price1=document.getElementById("price1").value

let hotel2=lineBreak(document.getElementById("hotel2").value)
let price2=document.getElementById("price2").value

let itinerary=lineBreak(document.getElementById("itinerary").value)

let inclusions=listFormat(document.getElementById("inclusions").value)
let exclusions=listFormat(document.getElementById("exclusions").value)

document.getElementById("formArea").style.display="none";
document.getElementById("output").style.display="block";

document.getElementById("output").innerHTML = `

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">

<img src="logo.png" style="height:70px">

<div style="text-align:right">

<h2 style="margin:0">Rustic Routes Holidays</h2>

<p style="margin:3px 0">
Phone : +91 9811335942<br>
Email : bookings@rusticroutes.net<br>
Web : www.rusticroutes.net
</p>

</div>

</div>

<hr>

<h3 style="text-align:center">PACKAGE QUOTATION</h3>



Destination : ${destination}<br>
Pax : ${pax}<br>
Duration : ${duration}<br>
Travel Date : ${date}<br>

Arrival : ${arrival}<br>
Departure : ${departure}<br>

<hr>

<h3>Option 1</h3>

${hotel1}<br><br>

<b>Package Cost :</b> ${price1}

<hr>

<h3>Option 2</h3>

${hotel2}<br><br>

<b>Package Cost :</b> ${price2}

<hr>

<h3>Brief Itinerary</h3>

${itinerary}

<hr>

<h3>Inclusions</h3>

${inclusions}

<hr>

<h3>Exclusions</h3>

${exclusions}

`

}

function downloadPDF(){
window.print()
}

</script>

</body>

</html>
