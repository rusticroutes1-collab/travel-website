```html
<!DOCTYPE html>
<html>
<head>
<title>Travel Quotation AI Tool</title>

<style>
body{
font-family: Arial;
margin:40px;
}

textarea{
width:100%;
height:150px;
}

input{
width:100%;
padding:6px;
margin-bottom:10px;
}

button{
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
cursor:pointer;
}

h3{
margin-top:25px;
}
</style>

</head>

<body>

<h2>AI Travel Quotation Extractor</h2>

<h3>Paste Supplier Quotation</h3>
<textarea id="roughQuote"></textarea>

<br><br>
<button onclick="runAI()">Extract Details with AI</button>

<h3>Travel Details</h3>

<label>Duration</label>
<input id="duration">

<label>Travel Date</label>
<input id="date">

<label>Arrival</label>
<input id="arrival">

<label>Departure</label>
<input id="departure">

<h3>Hotel</h3>

<label>Hotel Name</label>
<input id="hotel1">

<label>Package Price</label>
<input id="price1">

<h3>Inclusions</h3>
<textarea id="inclusions"></textarea>

<h3>Exclusions</h3>
<textarea id="exclusions"></textarea>


<script>

async function runAI(){

let text = document.getElementById("roughQuote").value;

if(!text){
alert("Please paste quotation text first");
return;
}

let response = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY"
},
body: JSON.stringify({
model:"gpt-4o-mini",
response_format:{type:"json_object"},
messages:[
{
role:"system",
content:"Extract travel quotation details and return JSON with fields: duration, travel_date, arrival, departure, hotel, price, inclusions, exclusions"
},
{
role:"user",
content:text
}
]
})
});

let data = await response.json();

let aiResult = JSON.parse(data.choices[0].message.content);


/* Fill form fields */

if(aiResult.duration)
document.getElementById("duration").value = aiResult.duration;

if(aiResult.travel_date)
document.getElementById("date").value = aiResult.travel_date;

if(aiResult.arrival)
document.getElementById("arrival").value = aiResult.arrival;

if(aiResult.departure)
document.getElementById("departure").value = aiResult.departure;

if(aiResult.hotel)
document.getElementById("hotel1").value = aiResult.hotel;

if(aiResult.price)
document.getElementById("price1").value = aiResult.price;


/* Inclusions */

if(aiResult.inclusions){

document.getElementById("inclusions").value =
Array.isArray(aiResult.inclusions)
? aiResult.inclusions.join("\n")
: aiResult.inclusions;

}


/* Exclusions */

if(aiResult.exclusions){

document.getElementById("exclusions").value =
Array.isArray(aiResult.exclusions)
? aiResult.exclusions.join("\n")
: aiResult.exclusions;

}

}

</script>

</body>
</html>
