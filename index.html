<label>Destination</label>

<h3>Option 1</h3>
<h3>Paste Rough Quote</h3>

<textarea id="roughQuote" placeholder="Paste rough quotation here" style="width:100%;height:120px;"></textarea>

<button type="button" onclick="smartParse()">Auto Fill Fields</button>
<button onclick="extractWithAI()">AI Extract Quote</button>
<hr>

<textarea id="itinerary"></textarea>

<h3>Inclusions</h3>
<textarea id="inclusions"></textarea>

<textarea id="exclusions"></textarea>

<script>

let hotelCount = 1;

function smartParse(){



let text = document.getElementById("roughQuote").value;
let lines = text.split("\n");

let section="";
let inclusionsText="";
let exclusionsText="";
let cities=[];
let hotels=[];

for(let i=0;i<lines.length;i++){

let clean = lines[i].trim();
let lower = clean.toLowerCase();

if(clean==="") continue;

/* DESTINATION */

if(lower.startsWith("destination")){

let val = clean.split(":")[1];

if(val){

document.getElementById("destination").value = val.trim();

let parts = val.split("+");
let totalNights=0;

for(let j=0;j<parts.length;j++){

let nightMatch = parts[j].match(/\d+/);

if(nightMatch){
totalNights += parseInt(nightMatch[0]);
}

let city = parts[j].replace(/[0-9nN]/g,"").trim();

if(city){
cities.push(city);
}

}

let days = totalNights + 1;

document.getElementById("duration").value =
totalNights + " Nights / " + days + " Days";

}

continue;

}

/* DATE */

let dateMatch = clean.match(/\d{1,2}\s+[A-Za-z]+\s+\d{4}/);

if(dateMatch){
document.getElementById("date").value = dateMatch[0];
}

/* PAX */

if(lower.startsWith("pax")){

let val = clean.split(":")[1];

if(val){
document.getElementById("pax").value = val.trim();
}

continue;

}

/* PACKAGE COST */

if(lower.includes("package cost")){

let price = clean.match(/[0-9,]+/);

if(price){
document.getElementById("price1").value = "₹"+price[0];
}

continue;

}



/* HOTEL DETECTION */

if(clean.match(/\b\d+\s*(night|nights|nts)\b/i)){
hotels.push(clean);
}
/* INCLUSIONS */

if(lower.includes("inclusion")){
section = "inclusions";
continue;
}

/* EXCLUSIONS */

if(lower.includes("exclusion")){
section = "exclusions";
continue;
}

/* CAPTURE INCLUSIONS */

if(section === "inclusions"){

if(clean === "") continue;

if(lower.includes("exclusion")){
section = "exclusions";
continue;
}

inclusionsText += clean + "\n";
continue;

}

/* CAPTURE EXCLUSIONS */

if(section === "exclusions"){
exclusionsText += clean + "\n";
continue;
}
}   // closes the for loop


/* ARRIVAL + DEPARTURE */

if(cities.length > 0){

document.getElementById("arrival").value = cities[0];
document.getElementById("departure").value = cities[cities.length-1];

}


/* APPLY TEXT */

document.getElementById("inclusions").value = inclusionsText;
document.getElementById("exclusions").value = exclusionsText;

}
function addHotelOption(){

hotelCount++;

let html = `
<div id="option${hotelCount}">
<hr>

<h3>Option ${hotelCount}</h3>

<label>Hotel Details</label>
<input type="text" id="hotel${hotelCount}">

<label>Package Cost</label>
<input type="text" id="price${hotelCount}">

</div>
`;

document.getElementById("hotelOptions").innerHTML += html;

}

async function extractWithAI(){



let text = document.getElementById("roughQuote").value;

let response = await fetch("https://weathered-mountain-83f0.rusticroutes1.workers.dev",{
method:"POST",
headers:{
"Content-Type":"application/json",

},
body:JSON.stringify({
model:"gpt-4.1-mini",
messages:[
{
role:"system",
content:"Extract travel quotation details from the text and return ONLY JSON in this format: {destination:'', duration:'', travelDate:'', arrival:'', departure:'', packageCost:'', hotels:[], hotelOptions:[], inclusions:[], itinerary:[], transport:'', pax:'', adults:'', children:''}"
},
{
role:"user",
content:text
}
]
})
});
let data = await response.json();

let aiText = data.choices[0].message.content;

aiText = aiText.replace(/```json/g,'').replace(/```/g,'');
let aiData = JSON.parse(aiText);

/* PAX */

if(aiData.pax && document.getElementById("pax")){
document.getElementById("pax").value = parseInt(aiData.pax);
}

/* ADULTS */

if(aiData.adults && document.getElementById("adults")){
document.getElementById("adults").value = parseInt(aiData.adults);
}

/* CHILDREN */

if(aiData.children && document.getElementById("children")){
document.getElementById("children").value = parseInt(aiData.children);
}
/* AUTO CALCULATE PAX */

if(!aiData.pax && aiData.adults){

let pax = parseInt(aiData.adults);

if(aiData.children){
pax += parseInt(aiData.children);
}

document.getElementById("pax").value = pax;

}
// Hotels
if(aiData.hotels){
document.getElementById("hotel1").value = aiData.hotels.join("\n");
}
if(aiData.hotelOptions && aiData.hotelOptions.length > 1){

for(let i=1;i<aiData.hotelOptions.length;i++){

addHotelOption();

let hotelField = document.getElementById("hotel"+(i+1));

if(hotelField){
hotelField.value = aiData.hotelOptions[i].join(", ");
}

}

}
// Package cost
if(aiData.packageCost){
document.getElementById("price1").value = aiData.packageCost;
}

// Inclusions
if(aiData.inclusions){
document.getElementById("inclusions").value = aiData.inclusions.join("\n");
}

// Itinerary
if(aiData.itinerary){
document.getElementById("itinerary").value = aiData.itinerary.join("\n");
}

// Transport
if(aiData.transport){
document.getElementById("transport").value = aiData.transport;
}


}    
function generateQuotation(){

let destination=document.getElementById("destination").value
let pax = document.getElementById("pax").value;

let paxText = pax + " Adult";
if(pax > 1){
    paxText = pax + " Adults";
}
let duration=document.getElementById("duration").value
let date=document.getElementById("date").value
let arrival=document.getElementById("arrival").value
let departure=document.getElementById("departure").value

let hotel1 = document.getElementById("hotel1").value;
let price1 = document.getElementById("price1").value;

let hotelHTML = hotel1;

for(let i=2;i<=hotelCount;i++){

let h=document.getElementById("hotel"+i);

if(h && h.value){
hotelHTML += "<br>"+h.value
}

}

let itinerary=document.getElementById("itinerary").value
let inclusions=document.getElementById("inclusions").value
let exclusions=document.getElementById("exclusions").value

document.getElementById("formArea").style.display="none";
document.getElementById("output").style.display="block";

document.getElementById("output").innerHTML = `

<h2 style="text-align:center">PACKAGE QUOTATION</h2>

<b>Destination :</b> ${destination}<br>
<b>Pax :</b> ${paxText}<br>
<b>Duration :</b> ${duration}<br>
<b>Travel Date :</b> ${date}<br>
<b>Arrival :</b> ${arrival}<br>
<b>Departure :</b> ${departure}<br>

<hr>

<h3>Hotel</h3>

<b>Package Cost :</b> ${price1}<br><br>

${hotelHTML}

<hr>

<h3>Brief Itinerary</h3>

${itinerary}

<hr>

<h3>Inclusions</h3>

${inclusions.split("\n").map(i => "<li>"+i+"</li>").join("")}
<hr>

<h3>Exclusions</h3>

${exclusions}

`;

}
function downloadPDF(){
window.print();
}

</script>
