```html
<!DOCTYPE html>
<html>
<head>
<title>Travel Quotation AI Tool</title>

<style>
body{font-family:Arial;margin:40px;}
textarea{width:100%;height:140px;}
input{width:100%;padding:6px;margin-bottom:10px;}
button{padding:10px 20px;background:#2c7be5;color:white;border:none;cursor:pointer;}
</style>

</head>

<body>

<h2>AI Travel Quotation Extractor</h2>

<h3>Paste Supplier Quotation</h3>
<textarea id="roughQuote"></textarea>

<br><br>
<button onclick="runAI()">Extract Details</button>

<h3>Travel Details</h3>

<label>Duration</label>
<input id="duration">

<label>Travel Date</label>
<input id="date">

<label>Arrival</label>
<input id="arrival">

<label>Departure</label>
<input id="departure">

<h3>Hotel</h3>

<label>Hotel Name</label>
<input id="hotel1">

<label>Package Price</label>
<input id="price1">

<h3>Inclusions</h3>
<textarea id="inclusions"></textarea>

<h3>Exclusions</h3>
<textarea id="exclusions"></textarea>


<script>

async function runAI(){

const text = document.getElementById("roughQuote").value;

if(!text){
alert("Paste quotation first");
return;
}

const response = await fetch("https://weathered-mountain-83f0.rusticroutes1.workers.dev",{
method:"POST",
headers:{
"Content-Type":"application/json",
},
body: JSON.stringify({
model:"gpt-4o-mini",
response_format:{type:"json_object"},
messages:[
{
role:"system",
content:`Extract travel quotation details from the provided text.

Rules:
- Extract the package price exactly as written.
- Do NOT calculate or multiply the price.
- Return only the numeric value for price.

Return JSON with the following fields:
duration,
travel_date,
arrival,
departure,
hotel,
price,
inclusions,
exclusions`
},
{
role:"user",
content:text
}
]
})
});
const data = await response.json();
console.log(data);
let result = {};

if(data.choices && data.choices.length > 0){
result = JSON.parse(data.choices[0].message.content);
console.log(result);
}else{
console.error("AI response invalid:", data);
alert("AI response error. Check Worker.");
return;
}
if(result.duration) document.getElementById("duration").value=result.duration;
if(result.travel_date) document.getElementById("date").value=result.travel_date;
if(result.arrival){

if(typeof result.arrival === "object"){
document.getElementById("arrival").value =
result.arrival.city ||
result.arrival.airport ||
result.arrival.name ||
"";
}else{
document.getElementById("arrival").value = result.arrival;
}

}
if(result.departure){

if(typeof result.departure === "object"){
document.getElementById("departure").value =
result.departure.city ||
result.departure.airport ||
result.departure.name ||
"";
}else{
document.getElementById("departure").value = result.departure;
}

}
if(result.hotels && result.hotels.length){

for(let i=0;i<result.hotels.length;i++){

let hotel = result.hotels[i];
let field = document.getElementById("hotel"+(i+1));

if(field){

if(typeof hotel === "object"){
field.value =
(hotel.name || "") +
(hotel.room ? " - " + hotel.room : "");
}else{
field.value = hotel;
}

}

}

}
else if(result.hotel){

if(typeof result.hotel === "object"){

document.getElementById("hotel1").value =
(result.hotel.name || "") +
(result.hotel.room ? " - " + result.hotel.room : "");

}else{

document.getElementById("hotel1").value = result.hotel;

}

}
if(result.price){

if(typeof result.price === "object"){

document.getElementById("price1").value =
result.price.amount ||
result.price.value ||
result.price.total ||
"";

}else{

document.getElementById("price1").value = result.price;

}

}
if(result.inclusions){
document.getElementById("inclusions").value =
Array.isArray(result.inclusions) ? result.inclusions.join("\n") : result.inclusions;
}

if(result.exclusions){
document.getElementById("exclusions").value =
Array.isArray(result.exclusions) ? result.exclusions.join("\n") : result.exclusions;
}

}

</script>

</body>
</html>
