<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Travel Proposal Builder</title>
<style>
body{font-family:Arial;margin:20px;background:#eef2f7}
h1{margin-top:0;color:#1f3c88}
h3{color:#1f3c88}
textarea,input,select{width:100%;padding:8px;margin:6px 0;border:1px solid #d0d7e2;border-radius:4px}
.section{background:#ffffff;padding:18px;margin-bottom:18px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button{padding:10px 16px;margin-top:10px;border:none;background:#1f6feb;color:white;border-radius:5px;cursor:pointer;font-weight:600}
button:hover{background:#174ea6}

ul{margin:8px 0 0 18px}

/* Hide input section in print */
@media print{
#inputSection{display:none}
button{display:none}
textarea,input{border:none}
body{background:white}
}

.itDay{font-weight:bold;color:#1f3c88}

.cityBlock2{display:none}

.headerBox{
background:#1f3c88;
color:white;
padding:15px 20px;
border-radius:8px;
margin-bottom:20px
}

</style>
</head>
<body>

<div class="headerBox">
<h1>Travel Proposal</h1>
<p style="margin:0">Custom Holiday Plan – Subject to availability & final confirmation</p>
</div>

<div class="section" id="inputSection">
<label>Paste Rough Quotation / WhatsApp Text</label>
<textarea id="roughQuote" rows="8"></textarea>

<label>OpenAI API Key</label>
<input id="apiKey" placeholder="sk-...">

<button onclick="runAI()">Generate Proposal</button>
</div>

<div class="section">
<h3>Client & Quote Details</h3>
<div class="grid">
<div>
<label>Proposal No</label>
<input id="quoteNo" readonly>
</div>
<div>
<label>Create Date</label>
<input id="createDate" type="date">
</div>
<div>
<label>Client Name</label>
<input id="clientName">
</div>
<div>
<label>Client Contact</label>
<input id="clientContact">
</div>
</div>
</div>

<div class="section">
<h3>Trip Details</h3>
<div class="grid">
<div>
<label>Destination</label>
<input id="destination">
</div>
<div>
<label>Travel Date</label>
<input id="travelDate">
</div>
<div>
<label>Duration</label>
<input id="duration">
</div>
<div>
<label>Total Price</label>
<input id="price1">
</div>
</div>
</div>

<div class="section">
<h3>Pax Details</h3>
<div class="grid">
<div>
<label>Adults</label>
<input id="adults">
</div>
<div>
<label>Children</label>
<input id="children">
</div>
</div>
</div>

<div class="section" id="optionsContainer">
<h3>Hotel Options</h3>
<div id="optionsArea"></div>
<button onclick="addOption()">Add Hotel Option</button>
</div>

<datalist id="hotelMemory"></datalist>

<div class="section">
<h3>Inclusions</h3>
<div id="inclusionsList"></div>
</div>

<div class="section">
<h3>Exclusions</h3>
<div id="exclusionsList"></div>
</div>

<div class="section">
<h3>Day Wise Itinerary</h3>
<div id="itineraryList"></div>
<p style="margin-top:10px;font-size:13px;color:#666">* Itinerary subject to operational feasibility and local conditions.</p>
</div>

<div class="section">
<button onclick="printQuote()">Print / Save PDF</button>
</div>

<script>

/* Quote Number */
function generateQuoteNumber(){
let last = localStorage.getItem("lastQuoteNumber") || 0;
last = parseInt(last) + 1;
localStorage.setItem("lastQuoteNumber", last);

let year = new Date().getFullYear();
let number = "TP-"+year+"-"+String(last).padStart(3,"0");

document.getElementById("quoteNo").value = number;
}

function setToday(){
let today = new Date().toISOString().split('T')[0];
document.getElementById("createDate").value = today;
}

/* API KEY */
document.getElementById("apiKey").value = localStorage.getItem("openaiKey") || "";

/* HOTEL MEMORY */
function loadHotelMemory(){
let hotels = JSON.parse(localStorage.getItem("hotelMemory") || "[]");
let list = document.getElementById("hotelMemory");
list.innerHTML="";

hotels.forEach(h=>{
let opt=document.createElement("option");
opt.value=h;
list.appendChild(opt);
});
}

function rememberHotel(name){
if(!name) return;
let hotels = JSON.parse(localStorage.getItem("hotelMemory") || "[]");

if(!hotels.includes(name)){
hotels.push(name);
localStorage.setItem("hotelMemory",JSON.stringify(hotels));
}

loadHotelMemory();
}

loadHotelMemory();

/* HOTEL OPTIONS */
let optionCount=0;

function addOption(){
optionCount++;

let div=document.createElement("div");

div.className="section";

div.id="option"+optionCount;


div.innerHTML=`
<h4>Option ${optionCount}</h4>
Price
<input id="priceOption${optionCount}">

City
<input id="city${optionCount}_1">
Hotel
<input id="hotel${optionCount}_1" list="hotelMemory">

<div class="cityBlock2" id="cityBlock${optionCount}_2">
City
<input id="city${optionCount}_2">
Hotel
<input id="hotel${optionCount}_2" list="hotelMemory">
</div>
`;

document.getElementById("optionsArea").appendChild(div);
}

addOption();

async function runAI(){

let text=document.getElementById("roughQuote").value;
let apiKey=document.getElementById("apiKey").value;

localStorage.setItem("openaiKey",apiKey);

let prompt=`Extract travel quotation details.

Return JSON only.

{
"destination":"",
"travel_date":"",
"duration":"",
"adults":0,
"children":0,
"options":[{"price":"","cities":[{"city":"","hotel":""}]}],
"inclusions":[],
"exclusions":[],
"itinerary":[]
}

If itinerary missing generate a simple day wise itinerary.
If exclusions missing generate standard travel exclusions.

Text:\n${text}`;

let response=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"Extract structured travel quotation data"},
{role:"user",content:prompt}
]
})
});

let data=await response.json();

let aiText=data.choices[0].message.content;
aiText = aiText.replace(/```json|```/g,"").trim();

let start = aiText.indexOf("{");
let end = aiText.lastIndexOf("}");

if(start !== -1 && end !== -1){
aiText = aiText.substring(start,end+1);
}

let result={};

try{
result=JSON.parse(aiText);
}catch(e){
console.error("JSON parse error",e);
alert("AI response format error");
return;
}

fillForm(result);
}

function createList(container,data){
if(!data) return;
let arr = Array.isArray(data) ? data : data.split("\n");
let html="<ul>";
arr.forEach(item=>{
if(item && item.trim()) html+="<li>"+item+"</li>";
});
html+="</ul>";
container.innerHTML=html;
}

function buildItinerary(container,data){
if(!data) return;
let html="";

let arr = Array.isArray(data) ? data : data.split("\n");

arr.forEach((item,i)=>{
html += `<p><span class='itDay'>Day ${i+1}</span> – ${item}</p>`;
});

container.innerHTML=html;
}

function fillForm(result){

if(result.destination)
document.getElementById("destination").value=result.destination;

if(result.travel_date)
document.getElementById("travelDate").value=result.travel_date;

if(result.duration)
document.getElementById("duration").value=result.duration;

if(result.adults)
document.getElementById("adults").value=result.adults;

if(result.children)
document.getElementById("children").value=result.children;

if(result.options){

result.options.forEach((opt,i)=>{

if(i>=optionCount) addOption();

let index=i+1;

if(opt.price)
document.getElementById("priceOption"+index).value=opt.price;

if(opt.cities && opt.cities[0]){

let c1=opt.cities[0];

document.getElementById("city"+index+"_1").value=c1.city||"";
document.getElementById("hotel"+index+"_1").value=c1.hotel||"";

rememberHotel(c1.hotel);
}

if(opt.cities && opt.cities[1]){

let block=document.getElementById("cityBlock"+index+"_2");
block.style.display="block";

let c2=opt.cities[1];

document.getElementById("city"+index+"_2").value=c2.city||"";
document.getElementById("hotel"+index+"_2").value=c2.hotel||"";

rememberHotel(c2.hotel);
}

});

}

createList(document.getElementById("inclusionsList"),result.inclusions);
createList(document.getElementById("exclusionsList"),result.exclusions);

buildItinerary(document.getElementById("itineraryList"),result.itinerary);
}

function printQuote(){
window.print();
}

window.onload=function(){
setToday();
generateQuoteNumber();
};

</script>

</body>
</html>
